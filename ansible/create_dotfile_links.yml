- name: Create dotfile symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: yes  # 既存のファイルがあっても上書きする
  loop:
    - { src: "{{ ansible_env.HOME }}/dotfiles/nvim", dest: "~/.config/nvim" }
    - { src: "{{ ansible_env.HOME }}/dotfiles/zsh/.zshrc", dest: "~/.zshrc" }
    - { src: "{{ ansible_env.HOME }}/dotfiles/tmux/.tmux.conf", dest: "~/.tmux.conf" }
