[font.normal]
# family = "MesloLGS NF"
# for powerline10k
# family = "FiraCode Nerd Font" # Replace with your installed font name
# style = "Regular"

[general]
import = [
    # "~/.config/alacritty/themes/themes/github_dark.toml"
]

[env]
TERM = "alacritty"

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
# args = ["-l", "-c", "tmux a -t 0 || tmux -u"]
program = "/usr/bin/zsh"

#it may works on xfwm4
[window]
# opacity = 0.8
#decorations = "Full"
#startup_mode = "Maximized"
#dimensions = {columns = 50, lines = 50}
padding = {x = 10, y = 10}


#[keyboard]
#bindings = [
   #{ key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" }
#]

[keyboard]
# Ctrl + Shift + Space で Vi モード開始（デフォルト）
# これを i3 や Neovim と被らないキーに変更できます
bindings = [{ key = "V", mods = "Control", action = "ToggleViMode" }]
